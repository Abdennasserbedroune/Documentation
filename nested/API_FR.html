<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta content="width=device-width,initial-scale=1" name="viewport" />
  <title>Documentation API Beewant (FR)</title>
  <style>
    body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;background:#212121;color:#e8e9ea}
    .wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
    .card{max-width:720px;width:100%;background:#141515;border:1px solid rgba(255,255,255,.1);border-radius:14px;padding:18px 18px 14px}
    .title{font-weight:800;font-size:16px;margin:0 0 6px}
    .muted{color:rgba(255,255,255,.65);font-size:13px;line-height:1.55;margin:0 0 12px}
    .err{white-space:pre-wrap;background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.25);border-radius:12px;padding:12px 12px;margin-top:10px;color:#fecaca;font-size:12.5px}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card" id="statusCard">
      <p class="title">Chargement de la documentation API (FR)…</p>
      <p class="muted">Cette page génère la version française à partir de <code>API EN.html</code> tout en conservant le même design.</p>
      <p class="muted">Si vous voyez ce message en permanence, ouvrez la page via un serveur (GitHub Pages, serveur local), pas en <code>file://</code>.</p>
      <div class="err" id="err" style="display:none"></div>
    </div>
  </div>

  <script>
    (function(){
      function escapeRegExp(s){return s.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');}

      function protectBlocks(html){
        // Protect <pre> blocks (code examples) from replacements.
        var blocks = [];
        var out = html.replace(/<pre[\s\S]*?<\/pre>/gi, function(m){
          var key = "__BEEWANT_PRE_" + blocks.length + "__";
          blocks.push(m);
          return key;
        });
        return { html: out, blocks: blocks };
      }

      function restoreBlocks(html, blocks){
        var out = html;
        for (var i=0;i<blocks.length;i++){
          var key = "__BEEWANT_PRE_" + i + "__";
          out = out.replace(new RegExp(escapeRegExp(key), 'g'), blocks[i]);
        }
        return out;
      }

      function applyReplacements(html){
        // IMPORTANT: targeted replacements (no word-by-word) + safe UI translations.
        var repl = [
          ['<html lang="en">','<html lang="fr">'],
          ['<html lang="en"','<html lang="fr"'],
          ['<title>Beewant Documentation</title>','<title>Documentation API Beewant</title>'],

          // Header
          ['<span>API documentation</span>','<span>Documentation API</span>'],
          ['>Platform documentation<','>Documentation de la plateforme<'],
          ['>API\n              documentation<','>Documentation\n              API<'],

          // Search
          ['placeholder="Search docs (⌘K)"','placeholder="Rechercher dans la documentation (⌘K)"'],

          // Sidebar headings
          ['>Overview<',">Vue d'ensemble<"],
          ['>indexes<','>Index<'],

          // Sidebar items
          ['>Breaking it down<','>Décomposer<'],
          ['>Error handling<','>Gestion des erreurs<'],
          ['>workflow examples<','>Exemples de workflow<'],
          ['>Prerequisites<','>Prérequis<'],
          ['>Supported content types<','>Types de contenu pris en charge<'],
          ['>Getting started<','>Bien démarrer<'],

          // Indexes nav items
          ['>create an indexes<','>Créer un index<'],
          ['>list indexes<','>Lister les index<'],
          ['>retrieve an index<','>Récupérer un index<'],
          ['>update an index<','>Mettre à jour un index<'],
          ['>Delete an index<','>Supprimer un index<'],

          // Collections nav items
          ['>create a collection<','>Créer une collection<'],
          ['>list collections<','>Lister les collections<'],
          ['>Update collection<','>Mettre à jour une collection<'],
          ['>Detelete collection<','>Supprimer une collection<'],

          // Chat nav items
          ['>chat with text<','>Chat avec du texte<'],
          ['>chat with web<','>Chat avec le Web<'],
          ['>chat with tools<','>Chat avec des outils<'],
          ['>chat with images<','>Chat avec des images<'],
          ['>chat with index<','>Chat avec un index<'],
          ['>chat with collection<','>Chat avec une collection<'],
          ['>List chats<','>Lister les conversations<'],
          ['>continue chat<','>Continuer une conversation<'],

          // Sources nav items
          ['>New chat<','>Nouvelle conversation<'],
          ['>Existing chat<','>Conversation existante<'],

          // Agents nav items
          ['>create agent<','>Créer un agent<'],
          ['>List agents<','>Lister les agents<'],
          ['>Retrieve agent<','>Récupérer un agent<'],
          ['>update agent<','>Mettre à jour un agent<'],
          ['>delete agent<','>Supprimer un agent<'],

          // UI
          ['>Previous<','>Précédent<'],
          ['>Next<','>Suivant<'],
          ['>Copy<','>Copier<'],

          // Common API labels
          ['>API Method<','>Méthode API<'],
          ['>Query Parameters<','>Paramètres de requête<'],
          ['>Query Response Schema<','>Schéma de réponse<'],
          ['>Request Body<','>Corps de requête<'],
          ['>Endpoint<','>Endpoint<'],
          ['>Parameter<','>Paramètre<'],
          ['>Type<','>Type<'],
          ['>Description<','>Description<'],

          // Content headings (overview)
          ['<h2 id="overview">Overview</h2>',"<h2 id=\"overview\">Vue d'ensemble</h2>"],
          ['<h2 id="breaking-it-down">Breaking It Down</h2>','<h2 id="breaking-it-down">Décomposer</h2>'],
          ['<h2 id="responses-and-error-handling">Responses and Error Handling</h2>','<h2 id="responses-and-error-handling">Réponses et gestion des erreurs</h2>'],
          ['<h2 id="workflow-examples">Workflow Examples</h2>','<h2 id="workflow-examples">Exemples de workflow</h2>'],
          ['<h2 id="prerequisites">Prerequisites</h2>','<h2 id="prerequisites">Prérequis</h2>'],
          ['<h2 id="supported-content-types">Supported Content Types</h2>','<h2 id="supported-content-types">Types de contenu pris en charge</h2>'],
          ['<h2 id="getting-started">Getting Started</h2>','<h2 id="getting-started">Bien démarrer</h2>'],

          // Content rewrite (non-literal)
          [
            'Ready to dive into the Beewant API? With our versatile platform, you can easily extract information\n              from videos, audio files, and documents, turning your data into actionable insights. Built on REST\n              principles, our API returns responses in JSON format, making it accessible across various programming\n              languages and tools like Postman or any REST client.\n            ',
            "Prêt à utiliser l'API Beewant ? Notre plateforme vous permet d'extraire des informations à partir de vidéos, de fichiers audio et de documents afin de transformer vos contenus en informations exploitables. Basée sur les principes REST, l'API renvoie des réponses au format JSON et s'intègre facilement à Postman (ou à tout client REST) ainsi qu'à la plupart des langages.\n            "
          ],

          // Breaking down bullets
          ['<li><strong>Method Support:</strong> We offer several methods to interact with the API:','<li><strong>Méthodes disponibles :</strong> Plusieurs méthodes sont disponibles pour interagir avec l\'API :'],
          ['<li><span class="method-badge method-get">GET</span>: Retrieve data.</li>','<li><span class="method-badge method-get">GET</span> : Récupérer des données.</li>'],
          ['<li><span class="method-badge method-post">POST</span>: Create something new or trigger an action.\n                  </li>','<li><span class="method-badge method-post">POST</span> : Créer une ressource ou déclencher une action.</li>'],
          ['<li><span class="method-badge method-patch">PATCH</span>: Update existing information.</li>','<li><span class="method-badge method-patch">PATCH</span> : Mettre à jour une information existante.</li>'],
          ['<li><span class="method-badge method-delete">DELETE</span>: Remove something.</li>','<li><span class="method-badge method-delete">DELETE</span> : Supprimer une ressource.</li>'],
          ['<li><strong>Base URL:</strong> Our API can be accessed at <code>https://beewant.com.com/api</code>.</li>','<li><strong>URL de base :</strong> L\'API est accessible via <code>https://beewant.com.com/api</code>.</li>'],
          ['<li><strong>Parameters:</strong> Specify what you want to interact with (videos, audio, or documents)\n                using:','<li><strong>Paramètres :</strong> Précisez la ressource ciblée (vidéos, audio ou documents) à l\'aide de :'],
          ['<li>Path Parameters: Point to a specific object.</li>','<li>Paramètres de chemin : pointer vers un objet précis.</li>'],
          ['<li>Query Parameters: Additional options for filtering or sorting your responses.</li>','<li>Paramètres de requête : options supplémentaires (filtrage, tri, etc.).</li>'],
          ['<li><strong>Authentication:</strong> Don\'t forget to include your API key in the headers to authenticate\n                your requests. </li>','<li><strong>Authentification :</strong> Ajoutez votre clé API dans les en-têtes afin d\'authentifier vos requêtes.</li>'],

          // Errors paragraph
          [
            "Our API follows the RFC 9110 standard, so you'll always know if your request was successful or not.\n              Here's a breakdown of common HTTP status codes:",
            "L'API s'appuie sur les conventions HTTP (RFC 9110) : vous savez immédiatement si une requête a réussi ou non.\n              Voici les codes de statut les plus fréquents :"
          ],
          [
            "If you encounter a 4xx error, the response will include a code and a friendly message explaining the\n              issue, which can be displayed in your app.",
            "En cas d'erreur 4xx, la réponse inclut un code et un message explicatif que vous pouvez afficher dans votre application."
          ],

          // Prerequisites
          [
            'If you already have an account, go to the API Key page in your Beewant Accounts & Settings and click\n                the Copy icon next to your key.',
            "Si vous avez déjà un compte, ouvrez la page Clé API dans Beewant (Compte & Paramètres) puis cliquez sur l'icône Copier à côté de votre clé."
          ],
          [
            "If you don't have an account, sign up for a Beewant account, then follow the steps above to retrieve\n                your API key.",
            "Si vous n'avez pas de compte, créez-en un, puis suivez les étapes ci-dessus pour récupérer votre clé API."
          ],

          // Supported types
          ['<li><strong>Videos:</strong> MP4 format.</li>','<li><strong>Vidéos :</strong> format MP4.</li>'],
          ['<li><strong>Audio:</strong> MP3 format.</li>','<li><strong>Audio :</strong> format MP3.</li>'],
          ['<li><strong>Documents:</strong> Text-based files such as PDF, TXT, JSON, and DOC.</li>','<li><strong>Documents :</strong> fichiers texte (PDF, TXT, JSON, DOC, etc.).</li>'],

          // Getting started list
          ['<li>Select the content type(s) you wish to analyze.</li>','<li>Sélectionnez le(s) type(s) de contenu à analyser.</li>'],
          ['<li>Upload your content using the appropriate API endpoints.</li>','<li>Téléversez votre contenu via les endpoints correspondants.</li>'],
          ["<li>Wait for the processing to complete. A Chat button will appear when it's done.</li>","<li>Attendez la fin du traitement. Un bouton Chat apparaît une fois l'opération terminée.</li>"],
          ['<li>Use the Chat Playground to extract insights from your processed content.</li>','<li>Utilisez le Chat Playground pour extraire des informations à partir du contenu traité.</li>'],

          // Tokens reminder
          ['ENSURE TO REPLACE <code>&lt;YOUR_TOKEN&gt;</code> WITH YOUR API KEY.','ASSUREZ-VOUS DE REMPLACER <code>&lt;YOUR_TOKEN&gt;</code> PAR VOTRE CLÉ API.']
        ];

        var out = html;
        for (var i=0;i<repl.length;i++){
          out = out.split(repl[i][0]).join(repl[i][1]);
        }

        // Language switch (make FR active + point EN to API EN).
        out = out.split('<a class="lang-btn is-active" href="final doc.html">EN</a>').join('<a class="lang-btn" href="API EN.html">EN</a>');
        out = out.split('<a class="lang-btn" href="frenchdoc.html">FR</a>').join('<a class="lang-btn is-active" href="API_FR.html">FR</a>');

        return out;
      }

      function showError(e){
        var el = document.getElementById('err');
        if (!el) return;
        el.style.display = 'block';
        el.textContent = String(e && e.stack ? e.stack : e);
      }

      fetch('API EN.html', { cache: 'no-store' })
        .then(function(r){
          if(!r.ok) throw new Error('HTTP ' + r.status + ' while fetching API EN.html');
          return r.text();
        })
        .then(function(html){
          var protectedRes = protectBlocks(html);
          var translated = applyReplacements(protectedRes.html);
          translated = restoreBlocks(translated, protectedRes.blocks);

          document.open();
          document.write(translated);
          document.close();
        })
        .catch(function(e){
          showError(e);
          var card = document.getElementById('statusCard');
          if (card) {
            var p = document.createElement('p');
            p.className = 'muted';
            p.textContent = "Impossible de charger 'API EN.html'. Vérifiez que vous servez le dossier via HTTP (pas file://) et que le fichier existe au même emplacement.";
            card.appendChild(p);
          }
        });
    })();
  </script>
</body>
</html>
